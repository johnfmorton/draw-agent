<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Draw Agent</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
    <link rel="stylesheet" href="/src/styles/controls.css" />
    <link rel="stylesheet" href="/src/styles/dialog.css" />
    <link rel="stylesheet" href="/src/styles/editor.css" />
    <link rel="stylesheet" href="/src/styles/console.css" />
  </head>
  <body>
    <div id="app">
      <header id="header">
        <h1>Draw Agent</h1>
        <div id="artwork-selector"></div>
        <button id="new-artwork-btn" title="Create a new artwork file">+ New</button>
        <div id="header-actions">
          <button id="export-svg-btn" title="Export optimized SVG for AxiDraw">Export SVG</button>
          <button id="reset-btn" title="Reset to file defaults">Reset</button>
          <button id="copy-url-btn" title="Copy URL to clipboard">Copy URL</button>
        </div>
      </header>
      <main id="main">
        <aside id="editor-pane" aria-label="Code editor"></aside>
        <div id="editor-resizer" title="Drag to resize editor"></div>
        <div id="center-pane">
          <div id="preview-pane">
            <div id="preview-wrapper">
              <div id="preview"></div>
              <div id="artwork-caption"></div>
            </div>
          </div>
          <section id="console-panel" aria-label="Console"></section>
        </div>
        <div id="control-pane">
          <div id="control-pane-header">
            <span>Controls</span>
            <div id="control-pane-actions">
              <button id="add-control-btn" title="Add control">+</button>
              <button id="export-controls-btn" title="Export controls to clipboard">Export</button>
            </div>
          </div>
          <div id="control-list"></div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
